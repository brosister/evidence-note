name: evidence_note
description: "Evidence Note - personal promise and transaction evidence organizer."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.6
  device_info_plus: ^11.1.0
  flutter_contacts: ^1.1.9+2
  flutter_local_notifications: ^18.0.1
  fluttertoast: ^8.2.12
  google_mobile_ads: ^5.1.0
  image_picker: ^1.2.0
  http: ^1.2.2
  path_provider: ^2.1.5
  pdf: ^3.11.3
  photo_manager: ^3.7.1
  printing: ^5.14.2
  record: ^6.1.2
  share_plus: ^11.1.0
  shared_preferences: ^2.3.3
  signature: ^6.3.0
  flutter_timezone: ^4.1.1
  table_calendar: ^3.1.2
  timezone: ^0.10.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/fonts/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/evidence_note_logo.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/branding/evidence_note_logo.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#FFFFFF"
    image: assets/branding/evidence_note_logo.png
